server:
  port: 8091
  servlet:
    context-path: /api

spring:
  application:
    name: ppw-lab-evaluation
  web:
    error:
      include-stacktrace: never
  datasource:
    url: jdbc:h2:mem:labevaluationdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        "format_sql": true
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

jwt:
  secret: ${JWT_SECRET:LabEvaluationSecretKeyForHS256MustHaveAtLeastThirtyTwoBytes2026}
  expiration: 86400000
  refresh-expiration: 604800000
  issuer: ppw-lab-evaluation-api
  header: Authorization
  prefix: "Bearer "